spring.application.name=banking-api
server.port=${PORT:8080}
server.ssl.enabled=false

spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.h2.console.enabled=true

jwt.secret=${JWT_SECRET:local-dev-secret-key-change-this-in-production}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

banking.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,https://randomejoe.github.io}
banking.defaults.absolute-transfer-limit=1000.00
banking.defaults.daily-transfer-limit=500.00
