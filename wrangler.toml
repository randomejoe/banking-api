name = "banking-api"
main = "worker/index.js"
compatibility_date = "2026-06-09"

[vars]
CORS_ALLOWED_ORIGINS = "http://localhost:5173,http://127.0.0.1:5173,https://randomejoe.github.io"

[[containers]]
class_name = "BankingApiContainer"
image = "./Dockerfile"
max_instances = 1

[[durable_objects.bindings]]
name = "BANKING_API_CONTAINER"
class_name = "BankingApiContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["BankingApiContainer"]
